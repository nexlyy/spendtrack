# Сборка iOS-приложения в облаке — на GitHub-раннере macOS. Windows/Linux
# собрать .ipa не могут (требование Apple), поэтому сборку делает бесплатный
# macOS-раннер GitHub Actions. По умолчанию собираем БЕЗ подписи: получившийся
# .ipa ставится через AltStore/Sideloadly (бесплатный Apple ID). Как включить
# подпись прямо в CI — см. ios/README.md.
name: Build iOS (unsigned)

on:
  workflow_dispatch: {}
  push:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build (unsigned)
        working-directory: ios
        run: |
          xcodebuild \
            -project SpendTrack.xcodeproj \
            -scheme SpendTrack \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned .ipa
        working-directory: ios
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n1)"
          if [ -z "$APP_PATH" ]; then echo "::error::.app не найден"; exit 1; fi
          rm -rf Payload SpendTrack-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          zip -qry SpendTrack-unsigned.ipa Payload
          echo "IPA: $(du -h SpendTrack-unsigned.ipa | cut -f1)"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpendTrack-unsigned-ipa
          path: ios/SpendTrack-unsigned.ipa
          if-no-files-found: error
